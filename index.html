<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CBC Scheme Builder</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>CBC Scheme of Work Builder</h1>

<!-- ========================= -->
<!-- SCHOOL INFORMATION -->
<!-- ========================= -->

<div class="card">

<h2>School Information</h2>

<div class="grid">

<input id="year" placeholder="Academic Year" required>

<input id="term" placeholder="Term" required>

<input id="school" placeholder="School Name" required>

<input id="teacher" placeholder="Teacher Name" required>

<input id="subject" placeholder="Subject" required>

<input id="class" placeholder="Class & Combination" required>

<input id="periods" type="number" placeholder="Periods Per Week" required>

</div>

</div>

<div id="weeks"></div>

<div class="actions">

<button id="addWeek">
+ Add Week
</button>

<button id="generate">
Generate CBC Table
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
